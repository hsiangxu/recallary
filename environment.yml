name: recallary
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - pip
  - setuptools>=75
  - wheel
  - filelock>=3.16,<4
  - huggingface_hub>=0.27,<2
  - numpy>=2.1,<3
  - pyside6>=6.8,<7
  - bibtexparser>=1.4,<3
  - pymupdf>=1.25,<2
  - pytorch-cpu>=2.6,<3
  - sentence-transformers>=5.1,<6
  - typer>=0.15,<1
  - pytest>=8.3,<9
  - pip:
      - -e .
variables:
  PIP_NO_CACHE_DIR: "1"
  PYTHONUTF8: "1"
